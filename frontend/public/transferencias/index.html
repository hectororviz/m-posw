<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CSD Soler – Pagos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;600;700&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo:        #CC0000;
    --rojo-vivo:   #FF2222;
    --rojo-oscuro: #7a0000;
    --verde:       #00A020;
    --verde-ok:    #00cc44;
    --negro:       #070707;
    --carbon:      #0e0e0e;
    --gris:        #1a1a1a;
    --gris2:       #252525;
    --texto:       #F0F0F0;
    --texto-suave: #666;
    --blanco:      #FFFFFF;
  }

  /* ── MODO DÍA ───────────────────────────────── */
  body.dia {
    --negro:       #F0F0F0;
    --carbon:      #E4E4E4;
    --gris:        #D5D5D5;
    --gris2:       #C8C8C8;
    --texto:       #111111;
    --texto-suave: #777777;
  }
  body.dia #main-bg { opacity: 0.04; }
  body.dia #overlay { background: rgba(245,245,245,0.97); }
  body.dia #ov-bg { background: radial-gradient(ellipse at 50% 50%, rgba(180,0,0,0.08) 0%, transparent 65%); }
  body.dia #ov-monto { color: #111111; text-shadow: none; }
  body.dia #ov-label { color: var(--verde); }
  body.dia #ov-tipo  { color: #444444; }
  body.dia #ov-hora  { color: #666666; }
  body.dia #ov-ref   { color: #888888; }
  body.dia #overlay::before, body.dia #overlay::after { background: linear-gradient(90deg, transparent, var(--rojo), transparent); }
  body.dia .tarjeta { background: #e8e8e8; border-color: #ccc; }
  body.dia .tarjeta-monto { color: #111111; }
  body.dia .tarjeta-hora  { color: #666666; }
  body.dia #sin-pagos { color: #aaaaaa; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--negro);
    color: var(--texto);
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── LAYOUT ─────────────────────────────────── */
  #app {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    position: relative;
  }

  /* ── FONDO ATMOSFÉRICO ──────────────────────── */
  #main-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(204,0,0,0.09) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, rgba(0,160,32,0.05) 0%, transparent 40%);
  }

  /* ── PANEL CENTRAL ──────────────────────────── */
  #main {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 0 60px;
  }

  /* ── ESCUDO ─────────────────────────────────── */
  #escudo-wrap {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  #escudo {
    width: clamp(110px, 18vw, 180px);
    height: clamp(110px, 18vw, 180px);
    object-fit: contain;
    filter: drop-shadow(0 0 28px rgba(204,0,0,0.4));
    animation: pulso 5s ease-in-out infinite;
  }

  @keyframes pulso {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(204,0,0,0.35)); }
    50%       { filter: drop-shadow(0 0 44px rgba(204,0,0,0.65)); }
  }

  #club-nombre {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 6px;
    color: var(--texto-suave);
    text-transform: uppercase;
    text-align: center;
  }

  /* línea divisoria vertical */
  #divisor {
    width: 1px;
    height: clamp(120px, 22vh, 200px);
    background: linear-gradient(180deg, transparent, var(--rojo-oscuro), transparent);
    flex-shrink: 0;
  }

  /* ── RELOJ ──────────────────────────────────── */
  #reloj-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #reloj {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(5rem, 16vw, 12rem);
    font-weight: 200;
    letter-spacing: -2px;
    color: var(--texto);
    line-height: 1;
    text-shadow: 0 0 60px rgba(255,255,255,0.04);
  }

  #fecha {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(0.85rem, 2vw, 1.2rem);
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--texto-suave);
    text-transform: uppercase;
    margin-top: 6px;
  }

  #club-sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 5px;
    color: var(--verde);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* ── FILA DE TARJETAS ───────────────────────── */
  #tarjetas-wrap {
    position: relative;
    z-index: 1;
    padding: 0 0 16px 0;
    border-top: 1px solid var(--gris);
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.3));
  }

  #tarjetas-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px 8px;
  }

  #tarjetas-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 4px;
    color: var(--texto-suave);
    text-transform: uppercase;
  }

  #total-inline {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    color: var(--verde);
  }

  #tarjetas-scroll {
    display: flex;
    flex-direction: row;
    gap: 10px;
    padding: 0 20px 4px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }
  #tarjetas-scroll::-webkit-scrollbar { display: none; }

  .tarjeta {
    flex-shrink: 0;
    background: var(--carbon);
    border: 1px solid var(--gris);
    border-radius: 4px;
    padding: 12px 18px;
    min-width: 155px;
    position: relative;
    overflow: hidden;
    animation: tarjetaEntrada 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .tarjeta::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .tarjeta.bank::before { background: var(--verde); }
  .tarjeta.mp::before   { background: var(--rojo); }

  @keyframes tarjetaEntrada {
    from { opacity: 0; transform: translateY(12px) scale(0.94); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .tarjeta-monto {
    font-family: 'Oswald', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--texto);
    line-height: 1;
    white-space: nowrap;
  }

  .tarjeta-hora {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    color: var(--texto-suave);
    margin-top: 5px;
    letter-spacing: 1px;
  }

  .tarjeta-tipo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 5px;
    opacity: 0.7;
  }
  .tarjeta.bank .tarjeta-tipo { color: var(--verde); }
  .tarjeta.mp   .tarjeta-tipo { color: #cc4444; }

  #sin-pagos {
    font-size: 0.7rem;
    color: #2a2a2a;
    font-style: italic;
    padding: 4px 20px;
  }

  /* ── OVERLAY ────────────────────────────────── */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5,5,5,0.95);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  #ov-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(204,0,0,0.2) 0%, transparent 65%);
    animation: bgPulso 1.3s ease-in-out infinite alternate;
  }
  @keyframes bgPulso {
    from { opacity: 0.5; }
    to   { opacity: 1; }
  }

  /* líneas horizontales decorativas */
  #overlay::before, #overlay::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rojo), transparent);
    z-index: 1;
  }
  #overlay::before { top: 0; }
  #overlay::after  { bottom: 0; }

  #ov-content {
    position: relative;
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #ov-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 8px;
    color: var(--verde);
    text-transform: uppercase;
    animation: fadeUp 0.4s ease both;
  }

  #ov-monto {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(5rem, 18vw, 12rem);
    font-weight: 700;
    color: var(--blanco);
    line-height: 1;
    letter-spacing: -2px;
    text-shadow:
      0 0 80px rgba(204,0,0,0.55),
      0 0 160px rgba(204,0,0,0.2);
    animation: fadeUp 0.45s ease 0.05s both, escala 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.05s both;
  }

  #ov-tipo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--texto-suave);
    animation: fadeUp 0.4s ease 0.2s both;
  }

  #ov-hora {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--texto-suave);
    animation: fadeUp 0.4s ease 0.28s both;
  }

  #ov-ref {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    color: #444;
    letter-spacing: 1px;
    animation: fadeUp 0.4s ease 0.32s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes escala {
    from { transform: scale(0.72); }
    to   { transform: scale(1); }
  }

  /* barra de progreso */
  #ov-barra-wrap {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: #1a1a1a;
    z-index: 2;
  }
  #ov-barra {
    height: 100%;
    background: linear-gradient(90deg, var(--rojo-oscuro), var(--rojo-vivo));
    width: 100%;
    transform-origin: left;
  }

  /* ── LED ESTADO ─────────────────────────────── */
  #led {
    position: fixed;
    bottom: 16px;
    right: 16px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #222;
    z-index: 200;
    transition: background 0.15s, box-shadow 0.15s;
    box-shadow: 0 0 0 rgba(0,0,0,0);
  }
  #led.ok {
    background: var(--verde-ok);
    box-shadow: 0 0 8px var(--verde-ok);
  }
  #led.error {
    background: var(--rojo-vivo);
    box-shadow: 0 0 8px var(--rojo-vivo);
    animation: parpadeo 1s ease infinite;
  }
  @keyframes parpadeo {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.15; }
  }

  /* ── BOTÓN MODO ─────────────────────────────── */
  #btn-modo {
    position: fixed;
    bottom: 14px;
    left: 14px;
    z-index: 200;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid #252525;
    background: var(--carbon);
    color: var(--texto-suave);
    font-size: 0.8rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, transform 0.15s;
    line-height: 1;
  }
  #btn-modo:hover { transform: scale(1.15); border-color: var(--rojo); }
  body.dia #btn-modo { border-color: #bbb; background: #ddd; }
</style>
</head>
<body class="dia">

<div id="main-bg"></div>
<div id="led" title="Estado conexión"></div>
<button id="btn-modo" title="Cambiar modo">🌙</button>

<div id="app">

  <!-- PANEL CENTRAL -->
  <div id="main">
    <div id="escudo-wrap">
      <img id="escudo" src="Soler.png" alt="CSD Soler">
      <div id="club-nombre">CSD Soler</div>
    </div>

    <div id="divisor"></div>

    <div id="reloj-wrap">
      <div id="reloj">00:00:00</div>
      <div id="fecha"></div>
      <div id="club-sub">Sistema de Pagos</div>
    </div>
  </div>

  <!-- FILA DE TARJETAS -->
  <div id="tarjetas-wrap">
    <div id="tarjetas-header">
      <div id="tarjetas-label">Últimos pagos</div>
      <div id="total-inline">$ 0 · 0 operaciones</div>
    </div>
    <div id="tarjetas-scroll">
      <div id="sin-pagos">Sin pagos registrados</div>
    </div>
  </div>

</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="ov-bg"></div>
  <div id="ov-content">
    <div id="ov-label">✓ &nbsp;Pago recibido</div>
    <div id="ov-monto">$ 0</div>
    <div id="ov-tipo"></div>
    <div id="ov-hora"></div>
    <div id="ov-ref"></div>
  </div>
  <div id="ov-barra-wrap">
    <div id="ov-barra"></div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const ENDPOINT    = 'https://automat.csdsoler.com.ar/webhook/pendiente';
const POLL_MS     = 5000;
const OVERLAY_SEG = 10;
const MAX_TARJ    = 20;
const LED_ON_MS   = 1100;

// ── ESTADO ─────────────────────────────────────────────────────────────────
let totalDia  = 0;
let cantOps   = 0;
let mostrando = false;
let overlayTimer, ledTimer;

// ── REFS DOM ───────────────────────────────────────────────────────────────
const elReloj   = document.getElementById('reloj');
const elFecha   = document.getElementById('fecha');
const elScroll  = document.getElementById('tarjetas-scroll');
const elSinP    = document.getElementById('sin-pagos');
const elTotal   = document.getElementById('total-inline');
const elOverlay = document.getElementById('overlay');
const elOvMonto = document.getElementById('ov-monto');
const elOvTipo  = document.getElementById('ov-tipo');
const elOvHora  = document.getElementById('ov-hora');
const elOvRef   = document.getElementById('ov-ref');
const elBarra   = document.getElementById('ov-barra');
const elLed     = document.getElementById('led');

// ── RELOJ ──────────────────────────────────────────────────────────────────
const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function actualizarReloj() {
  const n = new Date();
  elReloj.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  elFecha.textContent = `${DIAS[n.getDay()]} ${n.getDate()} de ${MESES[n.getMonth()]}`;
}
function pad(x) { return String(x).padStart(2,'0'); }
setInterval(actualizarReloj, 1000);
actualizarReloj();

// ── AUDIO ──────────────────────────────────────────────────────────────────
function sonar() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523.25, 659.25, 783.99, 1046.5].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.13;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.38, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.38);
      osc.start(t); osc.stop(t + 0.38);
    });
  } catch(e) {}
}

// ── FORMATO ────────────────────────────────────────────────────────────────
function fmt(n) {
  return '$ ' + Number(n).toLocaleString('es-AR', {minimumFractionDigits: 0, maximumFractionDigits: 2});
}
function fmtHora(s) {
  const d = new Date(s);
  return isNaN(d) ? '' : `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function tipoInfo(tipo) {
  if (tipo === 'bank_transfer' || tipo === 'cvu')
    return { txt: 'Transferencia bancaria', cls: 'bank' };
  if (tipo === 'account_money')
    return { txt: 'Mercado Pago', cls: 'mp' };
  return { txt: tipo || 'Pago', cls: 'mp' };
}

// ── TARJETAS ───────────────────────────────────────────────────────────────
function agregarTarjeta(pago) {
  elSinP.style.display = 'none';
  const t   = tipoInfo(pago.tipo);
  const ref = pago.referencia || pago.pagador || null;
  const el  = document.createElement('div');
  el.className = `tarjeta ${t.cls}`;
  el.innerHTML = `
    <div class="tarjeta-monto">${fmt(pago.monto)}</div>
    <div class="tarjeta-hora">${fmtHora(pago.fecha)}</div>
    <div class="tarjeta-tipo">${t.txt}</div>
  `;
  // insertar al principio (izquierda)
  elScroll.insertBefore(el, elScroll.firstChild);
  elScroll.scrollLeft = 0;

  // limitar cantidad
  const items = elScroll.querySelectorAll('.tarjeta');
  if (items.length > MAX_TARJ) items[items.length - 1].remove();
}

// ── TOTAL ──────────────────────────────────────────────────────────────────
function actualizarTotal(monto) {
  totalDia += Number(monto);
  cantOps  += 1;
  elTotal.textContent = `${fmt(totalDia)} · ${cantOps} operación${cantOps !== 1 ? 'es' : ''}`;
}

// ── OVERLAY ────────────────────────────────────────────────────────────────
function mostrarOverlay(pago) {
  mostrando = true;
  const t   = tipoInfo(pago.tipo);
  const ref = pago.referencia || pago.pagador || null;

  elOvMonto.textContent = fmt(pago.monto);
  elOvTipo.textContent  = t.txt;
  elOvHora.textContent  = pago.fecha ? `Acreditado a las ${fmtHora(pago.fecha)}` : '';
  elOvRef.textContent   = ref ? `Ref: ${ref}` : '';

  // reset animaciones
  elOvMonto.style.animation = 'none';
  void elOvMonto.offsetWidth;
  elOvMonto.style.animation = '';

  elOverlay.classList.add('visible');

  elBarra.style.transition = 'none';
  elBarra.style.transform  = 'scaleX(1)';
  requestAnimationFrame(() => {
    elBarra.style.transition = `transform ${OVERLAY_SEG}s linear`;
    elBarra.style.transform  = 'scaleX(0)';
  });

  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(ocultarOverlay, OVERLAY_SEG * 1000);
}

function ocultarOverlay() {
  elOverlay.classList.remove('visible');
  clearTimeout(overlayTimer);
  elBarra.style.transition = 'none';
  elBarra.style.transform  = 'scaleX(1)';
  mostrando = false;
}

elOverlay.addEventListener('click', ocultarOverlay);

// ── LED ────────────────────────────────────────────────────────────────────
function ledOk() {
  clearTimeout(ledTimer);
  elLed.classList.remove('error');
  elLed.classList.add('ok');
  ledTimer = setTimeout(() => elLed.classList.remove('ok'), LED_ON_MS);
}
function ledError() {
  clearTimeout(ledTimer);
  elLed.classList.remove('ok');
  elLed.classList.add('error');
}

// ── MODO DÍA/NOCHE ─────────────────────────────────────────────────────────
const btnModo = document.getElementById('btn-modo');
let modoNoche = false;
btnModo.addEventListener('click', () => {
  modoNoche = !modoNoche;
  document.body.classList.toggle('dia', !modoNoche);
  btnModo.textContent = modoNoche ? '🌙' : '☀️';
});

// ── POLLING ────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res  = await fetch(ENDPOINT, { cache: 'no-store' });
    const raw  = await res.json();
    const data = Array.isArray(raw) ? raw[0] : raw;

    ledOk();

    if (data && data.hay_pago === true) {
      if (!data.referencia && data.pagador) data.referencia = data.pagador;
      sonar();
      actualizarTotal(data.monto);
      agregarTarjeta(data);
      mostrarOverlay(data);
    }

  } catch(e) {
    ledError();
  }
}

setInterval(poll, POLL_MS);
poll();
</script>
</body>
</html>
