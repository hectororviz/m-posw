version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/hectororviz/m-posw-backend:${DOCKER_TAG:-latest}
    # Rollback a versión estable: image: ghcr.io/hectororviz/m-posw-backend:v1.1.0
    build: ./backend

    restart: unless-stopped

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      RUN_SEED: "1"

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - uploads_data:/data/uploads

    networks:
      - default

  frontend:
    image: ghcr.io/hectororviz/m-posw-frontend:${DOCKER_TAG:-latest}
    # Rollback a versión estable: image: ghcr.io/hectororviz/m-posw-frontend:v1.1.0
    build: ./frontend

    restart: unless-stopped

    env_file:
      - .env

    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_UPLOADS_BASE_URL: ${VITE_UPLOADS_BASE_URL}

    depends_on:
      - backend

    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - default
      - caddy_net

    labels:
      caddy: pos.csdsoler.com.ar
      caddy.reverse_proxy: "{{upstreams 80}}"

volumes:
  db_data:
  uploads_data:

networks:
  caddy_net:
    external: true
