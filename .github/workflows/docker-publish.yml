name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker tags
        id: meta
        run: |
          IMAGE_BACKEND="ghcr.io/${{ env.IMAGE_NAME }}-backend"
          IMAGE_FRONTEND="ghcr.io/${{ env.IMAGE_NAME }}-frontend"
          TAGS_BACKEND="${IMAGE_BACKEND}:latest"
          TAGS_FRONTEND="${IMAGE_FRONTEND}:latest"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            TAGS_BACKEND="${TAGS_BACKEND},${IMAGE_BACKEND}:${VERSION}"
            TAGS_FRONTEND="${TAGS_FRONTEND},${IMAGE_FRONTEND}:${VERSION}"
          fi

          echo "tags_backend=${TAGS_BACKEND}" >> $GITHUB_OUTPUT
          echo "tags_frontend=${TAGS_FRONTEND}" >> $GITHUB_OUTPUT

      - name: Build and push Backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags_backend }}
          no-cache: true

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_UPLOADS_BASE_URL=
          tags: ${{ steps.meta.outputs.tags_frontend }}
